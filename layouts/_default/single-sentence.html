{{ define "main" }}
<!-- ═══════════════════════════════════════════════════════════════════════
     DIRECTION 2: The Single Sentence
     Maximum restraint. One sentence. Two links. That's it.
     ═══════════════════════════════════════════════════════════════════════ -->

<div class="min-h-screen flex flex-col justify-center items-center px-6">
  <div class="max-w-xl w-full text-center">

    <!-- Name — large, serif, confident -->
    <h1 class="text-6xl md:text-8xl font-normal tracking-tight text-white mb-12"
        style="font-family: 'Crimson Text', Georgia, serif; animation: sentenceFadeIn 1s ease-out;">
      Adam Thede
    </h1>

    <!-- The sentence -->
    <p class="text-lg md:text-xl text-slate-400 font-light leading-relaxed mb-16"
       style="animation: sentenceFadeIn 1.2s ease-out 0.3s both;">
      I build software and preserve memory.
    </p>

    <!-- Two links — the fork -->
    <div class="flex flex-col sm:flex-row justify-center items-center gap-6 sm:gap-12"
         style="animation: sentenceFadeIn 1.2s ease-out 0.6s both;">

      <a href="https://thedetech.com" target="_blank" rel="noopener"
         class="group text-xs uppercase tracking-[0.2em] transition-all"
         style="color: #D4A574;">
        <span class="inline-flex items-center gap-2">
          <span class="h-px w-6 transition-all" style="background: rgba(212,165,116,0.3); display: inline-block;"></span>
          For Engineering
          <span class="h-px w-6 transition-all" style="background: rgba(212,165,116,0.3); display: inline-block;"></span>
        </span>
      </a>

      <a href="https://officeofadamthede.com" target="_blank" rel="noopener"
         class="group text-xs uppercase tracking-[0.2em] transition-all"
         style="color: #2dd4bf;">
        <span class="inline-flex items-center gap-2">
          <span class="h-px w-6 transition-all" style="background: rgba(45,212,191,0.3); display: inline-block;"></span>
          For Everything Else
          <span class="h-px w-6 transition-all" style="background: rgba(45,212,191,0.3); display: inline-block;"></span>
        </span>
      </a>
    </div>

    <!-- Social — barely there -->
    <div class="mt-24 flex justify-center items-center gap-6"
         style="animation: sentenceFadeIn 1.2s ease-out 0.9s both;">
      <a href="{{ .Site.Params.linkedin }}" target="_blank" rel="noopener" class="text-slate-700 hover:text-slate-400 transition-colors">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      </a>
      <a href="{{ .Site.Params.github }}" target="_blank" rel="noopener" class="text-slate-700 hover:text-slate-400 transition-colors">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
      </a>
    </div>
  </div>
</div>

<style>
  @keyframes sentenceFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>
{{ end }}
