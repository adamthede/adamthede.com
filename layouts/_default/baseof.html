<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} — Adam Thede</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="author" content="{{ .Site.Params.author }}">

  <!-- Canonical URL -->
  <link rel="canonical" href="{{ .Permalink }}">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" href="/og-image.png">

  <!-- Open Graph -->
  {{ $ogTitle := cond (.IsHome) "Adam Thede — Engineering Leader & AI-Augmented Builder" (printf "%s — Adam Thede" .Title) }}
  <meta property="og:title" content="{{ $ogTitle }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:site_name" content="Adam Thede">
  <meta property="og:image" content="{{ .Site.BaseURL }}og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:alt" content="Adam Thede — Builder of systems, keeper of memory">
  <meta property="og:locale" content="en_US">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ $ogTitle }}">
  <meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="twitter:image" content="{{ .Site.BaseURL }}og-image.png">
  <meta name="twitter:image:alt" content="Adam Thede — Builder of systems, keeper of memory">

  <!-- Schema.org Person -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Adam Thede",
    "url": "https://adamthede.com",
    "jobTitle": "Engineering Leader & AI-Augmented Builder",
    "description": "{{ .Site.Params.description }}",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Nashville",
      "addressRegion": "TN"
    },
    "sameAs": [
      "{{ .Site.Params.linkedin }}",
      "{{ .Site.Params.github }}",
      "{{ .Site.Params.thedetech }}",
      "{{ .Site.Params.officeofadamthede }}"
    ],
    "image": "{{ .Site.BaseURL }}og-image.png"
  }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

  <!-- CSS -->
  {{ with resources.Get "css/main.css" | postCSS }}
    <style>{{ .Content | safeCSS }}</style>
  {{ end }}
</head>
<body class="min-h-screen">
  <main>
    {{ block "main" . }}{{ end }}
  </main>
</body>
</html>
