<!-- Prototype navigation — remove before production -->
<nav style="position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 50;">
  <div style="display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: rgba(0,0,0,0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); border-radius: 9999px; font-size: 0.7rem; letter-spacing: 0.05em;">
    <span style="color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; margin-right: 0.5rem;">Prototypes</span>
    <a href="/"
       style="padding: 0.375rem 0.75rem; border-radius: 9999px; transition: all 0.2s; text-decoration: none; {{ if eq .RelPermalink "/" }}background: rgba(212,165,116,0.2); color: #D4A574; border: 1px solid rgba(212,165,116,0.3);{{ else }}color: #94a3b8; border: 1px solid transparent;{{ end }}"
       onmouseover="if(this.style.color!=='rgb(212, 165, 116)')this.style.color='#e2e8f0'"
       onmouseout="if(this.style.color!=='rgb(212, 165, 116)')this.style.color='#94a3b8'">
      Data Fork
    </a>
    <a href="/index-card/"
       style="padding: 0.375rem 0.75rem; border-radius: 9999px; transition: all 0.2s; text-decoration: none; {{ if eq .RelPermalink "/index-card/" }}background: rgba(212,165,116,0.2); color: #D4A574; border: 1px solid rgba(212,165,116,0.3);{{ else }}color: #94a3b8; border: 1px solid transparent;{{ end }}"
       onmouseover="if(this.style.color!=='rgb(212, 165, 116)')this.style.color='#e2e8f0'"
       onmouseout="if(this.style.color!=='rgb(212, 165, 116)')this.style.color='#94a3b8'">
      Index Card
    </a>
    <a href="/terminal/"
       style="padding: 0.375rem 0.75rem; border-radius: 9999px; transition: all 0.2s; text-decoration: none; {{ if eq .RelPermalink "/terminal/" }}background: rgba(212,165,116,0.2); color: #D4A574; border: 1px solid rgba(212,165,116,0.3);{{ else }}color: #94a3b8; border: 1px solid transparent;{{ end }}"
       onmouseover="if(this.style.color!=='rgb(212, 165, 116)')this.style.color='#e2e8f0'"
       onmouseout="if(this.style.color!=='rgb(212, 165, 116)')this.style.color='#94a3b8'">
      Terminal
    </a>
  </div>
</nav>
